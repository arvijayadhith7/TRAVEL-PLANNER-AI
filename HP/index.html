<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripsero - Your Next Escape</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../index.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_green.css">
</head>

<body data-page="home">

    <!-- Hero Section with Background -->
    <section class="hero-wrapper">

        <!-- Navigation -->
        <nav class="glass-nav">
            <div class="container nav-content">
                <a href="#" class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-paper-plane"></i></div>
                    <span>Tripsero</span>
                </a>

                <div class="nav-links">
                    <a href="#" class="active">Home</a>
                    <a href="../hotels.html">Explore</a>
                    <a href="../tripcart.html">My Trip</a>
                    <a href="../chat.html" style="color: #22c55e; font-weight: bold;"><i class="fa-solid fa-sparkles"></i> AI Planner</a>
                    <a href="../settings.html">Settings</a>
                    <a href="#">About us</a>
                </div>

                <div class="nav-actions">
                    <a href="../login.html" class="btn-signup">Login / Sign Up</a>
                </div>
            </div>
        </nav>

        <!-- Main Hero Content -->
        <div class="container hero-center">

            <h1 class="hero-title">
                Explore the world,<br>AI-style.
            </h1>

            <p class="hero-subtext">
                Tell us your preferences and we'll craft the perfect itinerary in seconds.
            </p>

            <!-- Search Bar Container -->
            <div class="search-container-bottom">

                <form class="main-search-bar" id="tripForm">
                    <!-- Destination -->
                    <div class="search-field">
                        <div class="icon-section">
                            <i class="fa-solid fa-location-dot"></i>
                        </div>
                        <div class="field-content" style="position: relative;">
                            <label>DESTINATION</label>
                            <input type="text" id="destination" placeholder="Where to?" required autocomplete="off">
                            <div id="citySuggestions" class="suggestions-dropdown" style="display: none;"></div>
                        </div>
                    </div>

                    <div class="v-divider"></div>

                    <!-- Budget -->
                    <div class="search-field">
                        <div class="icon-section">
                            <i class="fa-solid fa-money-bill-wave"></i>
                        </div>
                        <div class="field-content">
                            <label>BUDGET</label>
                            <select id="budget">
                                <option value="50000">Budget</option>
                                <option value="200000" selected>Midrange</option>
                                <option value="500000">Luxury</option>
                            </select>
                        </div>
                    </div>

                    <div class="v-divider"></div>

                    <!-- Date Picker (Hidden trigger) -->
                    <div class="search-field date-picker-wrapper">
                        <div class="icon-section">
                            <i class="fa-regular fa-calendar-check" id="calendarIcon" style="cursor: pointer;"></i>
                        </div>
                        <div class="field-content">
                            <label>DATES</label>
                            <input type="text" id="dateRange" placeholder="Select dates" readonly required>
                        </div>
                    </div>

                    <button type="submit" class="search-btn">
                        Plan My Trip <i class="fa-solid fa-sparkles"></i>
                    </button>
                </form>
            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="../database.js"></script>
    <script src="../app.js"></script>
    <script>
        // Initialize Flatpickr
        const fp = flatpickr("#dateRange", {
            mode: "range",
            minDate: "today",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "M j, Y",
            static: true,
            onClose: function (selectedDates, dateStr, instance) {
                if (selectedDates.length === 2) {
                    const diffTime = Math.abs(selectedDates[1] - selectedDates[0]);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    instance.altInput.value = `${instance.formatDate(selectedDates[0], "M j")} - ${instance.formatDate(selectedDates[1], "M j")} (${diffDays} days)`;
                }
            }
        });

        // Trigger calendar on icon click
        document.getElementById('calendarIcon').addEventListener('click', () => {
            fp.open();
        });

        // City Suggestions Logic
        const cities = ['Chennai', 'Ooty', 'Madurai', 'Kodaikanal', 'Mahabalipuram', 'Kanyakumari', 'Tanjore', 'Rameshwaram'];
        const destInput = document.getElementById('destination');
        const suggestionsBox = document.getElementById('citySuggestions');

        function showSuggestions(filter = '') {
            const filtered = cities.filter(c => c.toLowerCase().includes(filter.toLowerCase()));
            if (filtered.length > 0) {
                suggestionsBox.innerHTML = filtered.map(city => `
                    <div class="suggestion-item" onclick="selectCity('${city}')">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>${city}</span>
                    </div>
                `).join('');
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        }

        function selectCity(city) {
            destInput.value = city;
            suggestionsBox.style.display = 'none';
        }

        destInput.addEventListener('focus', () => showSuggestions(destInput.value));
        destInput.addEventListener('input', (e) => showSuggestions(e.target.value));
        
        // Hide suggestions on click outside
        document.addEventListener('click', (e) => {
            if (!destInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        // Handle form submission
        document.getElementById('tripForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Authentication Guard
            if (!Auth.isLoggedIn()) {
                TripPlanner.showNotification('Please login or sign up to start planning!', 'warning');
                setTimeout(() => {
                    window.location.href = '../login.html';
                }, 1500);
                return;
            }

            // --- WOW Entrance Animations ---
            gsap.from(".glass-nav", { y: -100, opacity: 0, duration: 1, ease: "power4.out" });
            gsap.from(".hero-title", { x: -100, opacity: 0, duration: 1.2, delay: 0.3, ease: "power4.out" });
            gsap.from(".search-container", { y: 50, opacity: 0, duration: 1, delay: 0.6, ease: "back.out(1.7)" });
            gsap.from(".floating-badge", { scale: 0, opacity: 0, duration: 0.8, delay: 1, stagger: 0.2, ease: "back.out(2)" });
            
            // Subtle Hover Pulse for Logo
            gsap.to(".logo-icon", { 
                rotation: 10, 
                duration: 2, 
                repeat: -1, 
                yoyo: true, 
                ease: "sine.inOut" 
            });

            const destination = document.getElementById('destination').value;
            const dates = fp.selectedDates;

            if (dates.length < 2) {
                TripPlanner.showNotification('Please select a date range!', 'error');
                return;
            }

            const startDate = dates[0].toISOString().split('T')[0];
            const endDate = dates[1].toISOString().split('T')[0];
            const diffTime = Math.abs(dates[1] - dates[0]);
            const duration = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            const budgetValue = parseInt(document.getElementById('budget').value) || 50000;
            const budgetText = document.getElementById('budget').options[document.getElementById('budget').selectedIndex].text;

            const tripData = {
                destination: destination,
                budget: budgetValue,
                budgetType: budgetText,
                travelers: 2,
                duration: duration,
                startDate: startDate,
                endDate: endDate,
                preferences: 'all'
            };

            // Clear previous selections for a fresh start
            TripPlanner.clearCart();

            // Save to localStorage
            TripPlanner.saveTripData(tripData);

            // Redirect to loading page
            window.location.href = '../loading.html';
        });
    </script>

</body>

</html>
