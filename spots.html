<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Attractions - Tripsero</title>
    <link rel="stylesheet" href="spots.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body data-page="spots">

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="HP/index.html" class="logo-area">
                <i class="fa-solid fa-leaf" style="color: var(--primary);"></i>
                <span>Tripsero</span>
            </a>

            <nav class="nav-section">
                <h4>Home</h4>
                <a href="HP/index.html" class="nav-link">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a href="hotels.html" class="nav-link">
                    <i class="fa-solid fa-compass"></i>
                    <span>Hotels</span>
                </a>
                <a href="spots.html" class="nav-link active">
                    <i class="fa-solid fa-mountain-sun"></i>
                    <span>Spots</span>
                </a>
                <a href="tripcart.html" class="nav-link">
                    <i class="fa-solid fa-suitcase-rolling"></i>
                    <span>My Trip</span>
                </a>
            </nav>

            <nav class="nav-section">
                <h4>Settings</h4>
                <a href="settings.html" class="nav-link">
                    <i class="fa-solid fa-gear"></i>
                    <span>Preferences</span>
                </a>
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-circle-question"></i>
                    <span>Support</span>
                </a>
            </nav>

            <div class="filters-section">
                <div class="filter-group">
                    <label class="filter-label">Destination</label>
                    <input type="text" class="filter-input" id="destInput" placeholder="Where to?">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Budget</label>
                    <select class="filter-input" id="budgetSelect">
                        <option value="Budget">Budget</option>
                        <option value="Midrange" selected>Midrange</option>
                        <option value="Luxury">Luxury</option>
                    </select>
                </div>
                <button class="update-btn" onclick="updateFilters()">Update Trip</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <div class="hero-section">
                        <h1>Sights in <span id="displayDest">Tamil Nadu</span></h1>
                        <p>Showing handpicked experiences matching your destination.</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search for sights, landmarks..."
                            oninput="handleSearch(this.value)">
                    </div>
                </div>
            </header>

            <div class="filter-tabs">
                <button class="tab-btn active" data-filter="all"><i class="fa-regular fa-compass"></i> All</button>
                <button class="tab-btn" data-filter="nature"><i class="fa-solid fa-leaf"></i> Nature</button>
                <button class="tab-btn" data-filter="adventure"><i class="fa-solid fa-mountain"></i> Adventure</button>
                <button class="tab-btn" data-filter="religious"><i class="fa-solid fa-place-of-worship"></i>
                    Religious</button>
                <button class="tab-btn" data-filter="museum"><i class="fa-solid fa-landmark"></i> Museums</button>
                <button class="tab-btn" data-filter="beach"><i class="fa-solid fa-umbrella-beach"></i> Beaches</button>
            </div>

            <div class="spots-grid" id="spotsGrid">
                <!-- Cards will be injected here -->
            </div>

            <div class="load-more-container">
                <button class="load-more-btn">
                    Load more attractions <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- Floating Cart Toggle -->
    <div class="cart-toggle" onclick="window.location.href='tripcart.html'">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>View My Trip</span>
        <span class="cart-count-badge" id="floatingCartCount">0</span>
    </div>

    <script src="database.js"></script>
    <script src="app.js"></script>
    <script>
        let currentFilter = 'all';
        let searchQuery = '';

        function renderSpots() {
            const grid = document.getElementById('spotsGrid');
            const tripData = TripPlanner.getTripData();

            // Sync UI with trip data
            document.getElementById('displayDest').textContent = tripData.destination || 'Destination';
            document.getElementById('destInput').value = tripData.destination || '';
            document.getElementById('budgetSelect').value = tripData.budgetType || 'Midrange';

            let items = Database.activities || [];

            // Filter by destination
            if (tripData.destination) {
                const dest = tripData.destination.toLowerCase();
                items = items.filter(item =>
                    item.location.toLowerCase().includes(dest) ||
                    item.name.toLowerCase().includes(dest)
                );
            }

            // Apply category filter
            if (currentFilter !== 'all') {
                items = items.filter(item => {
                    if (!item.tags) return false;
                    return item.tags.some(t => t.toLowerCase() === currentFilter);
                });
            }

            // Apply search
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                items = items.filter(item =>
                    item.name.toLowerCase().includes(q) ||
                    item.location.toLowerCase().includes(q)
                );
            }

            if (items.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-muted);">
                    <i class="fa-solid fa-mountain-sun" style="font-size: 64px; opacity: 0.1; margin-bottom: 2rem;"></i>
                    <h3>No spots found</h3>
                    <p>Try adjusting your search or category filters.</p>
                </div>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="spot-card">
                    <div class="card-img-container">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="rating-badge">
                            <i class="fa-solid fa-star"></i> ${item.rating || '4.8'}
                        </div>
                    </div>
                    <div class="card-body">
                        <h3>${item.name}</h3>
                        <div class="info-item">
                            <i class="fa-regular fa-calendar" style="color: var(--primary);"></i> 
                            <span>Best: Oct - Mar</span>
                        </div>
                        <div class="info-item">
                            <i class="fa-solid fa-ticket" style="color: var(--primary);"></i> 
                            <span>Entry: ₹${item.price.toLocaleString()}</span>
                        </div>
                        
                        <div class="nature-score">
                            <label>Nature Score</label>
                            <div class="dots-rate">
                                ${Array(5).fill(0).map((_, i) => `<div class="dot ${i < Math.round(item.rating || 4) ? 'active' : ''}"></div>`).join('')}
                            </div>
                        </div>

                        <button class="add-trip-btn" onclick="addToTrip('${item.id}', this)">Add to Trip</button>
                    </div>
                </div>
            `).join('');

            updateCartCount();
        }

        async function addToTrip(id, btn) {
            const item = Database.activities.find(i => i.id === id);
            if (!item) return;

            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Adding...';
            btn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 600));

            const success = TripPlanner.addToCart('activities', {
                ...item,
                travelers: TripPlanner.getTripData().travelers || 2
            });

            if (success) {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Added!';
                btn.style.background = 'var(--primary)';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.style.background = '';
                }, 2000);
                updateCartCount();
            } else {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function updateCartCount() {
            const count = TripPlanner.getCartItemCount();
            document.getElementById('floatingCartCount').textContent = count;
        }

        function updateFilters() {
            const dest = document.getElementById('destInput').value;
            const budget = document.getElementById('budgetSelect').value;

            const tripData = TripPlanner.getTripData();
            tripData.destination = dest;
            tripData.budgetType = budget;
            TripPlanner.saveTripData(tripData);

            renderSpots();
        }

        function handleSearch(val) {
            searchQuery = val;
            renderSpots();
        }

        // Tab events
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderSpots();
            });
        });

        // Init
        window.addEventListener('database-ready', renderSpots);
        if (window.Database && window.Database.activities && window.Database.activities.length > 0) {
            renderSpots();
        }
    </script>
</body>

</html>
