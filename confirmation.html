<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Tripsero</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="confirmation.css">
</head>
<body>

    <div class="conf-container">
        <!-- Success Message -->
        <div class="success-header">
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1>Pack your bags!</h1>
            <p>Your trip is booked and your itinerary is ready.</p>
        </div>

        <!-- Boarding Pass Ticket -->
        <div class="ticket" id="boardingPass">
            <div class="ticket-top">
                <div class="ticket-logo">TRIPSERO AI</div>
                <div class="ticket-type">Boarding Pass</div>
            </div>

            <div class="ticket-body">
                <div class="loc-block">
                    <h2 id="originCity">YOUR HOME</h2>
                    <p>Origin</p>
                </div>
                <div class="plane-icon">
                    <i class="fa-solid fa-plane"></i>
                </div>
                <div class="loc-block" style="text-align: right;">
                    <h2 id="destCity">DESTINATION</h2>
                    <p>Destination</p>
                </div>
            </div>

            <div class="ticket-info">
                <div class="info-item">
                    <label>Passenger</label>
                    <span id="passName">User</span>
                </div>
                <div class="info-item">
                    <label>Travel Style</label>
                    <span id="tripStyle">Romantic</span>
                </div>
                <div class="info-item">
                    <label>Duration</label>
                    <span id="tripDuration">5 Days</span>
                </div>
                <div class="info-item">
                    <label>Date</label>
                    <span id="startDate">Feb 20, 2026</span>
                </div>
            </div>

            <div class="ticket-divider"></div>

            <div class="ticket-footer">
                <div class="footer-details">
                    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 4px;">CONFIRMATION CODE</p>
                    <h3 style="font-size: 18px; font-weight: 800; color: #1e293b;" id="confCode">TR-8829472</h3>
                </div>
                <div class="qr-code">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TripseroBooking8829472" alt="QR Code">
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="conf-actions">
            <button class="btn-primary" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Print Ticket
            </button>
            <a href="HP/index.html" class="btn-outline">
                Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // Populate Ticket Data
        window.onload = () => {
            const tripData = JSON.parse(localStorage.getItem('tripData') || '{}');
            const user = JSON.parse(localStorage.getItem('user') || '{"name": "Explorer"}');

            document.getElementById('destCity').innerText = (tripData.destination || 'TAMIL NADU').toUpperCase();
            document.getElementById('passName').innerText = user.name || 'Explorer';
            document.getElementById('tripStyle').innerText = tripData.travelStyle || 'Personalized';
            document.getElementById('tripDuration').innerText = (tripData.duration || 5) + ' Days';
            
            if (tripData.startDate) {
                const date = new Date(tripData.startDate);
                document.getElementById('startDate').innerText = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            // Generate random conf code
            const code = 'TR-' + Math.floor(1000000 + Math.random() * 9000000);
            document.getElementById('confCode').innerText = code;

            // Entrance Animation
            const tl = gsap.timeline();
            tl.from(".success-header", { y: -30, opacity: 0, duration: 0.8, ease: "power3.out" })
              .from(".ticket", { y: 100, opacity: 0, duration: 1, ease: "back.out(1.2)" }, "-=0.4")
              .from(".conf-actions", { y: 20, opacity: 0, duration: 0.6 }, "-=0.2");
        }
    </script>
</body>
</html>
